services:
  - type: web
    name: kavach-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kavach-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: NVIDIA_NIM_API_KEY_BACKUP
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production

databases:
  - name: kavach-db
    databaseName: kavach
    user: kavach
    plan: free
