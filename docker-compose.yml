version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kavach-postgres
    environment:
      POSTGRES_USER: kavach
      POSTGRES_PASSWORD: kavach
      POSTGRES_DB: kavach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavach"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
